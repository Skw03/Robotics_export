session_name: robotics_launcher launch

environment:
  MISSION_NAME: robotics_launcher
options:
  default-command: /bin/bash

windows:
- window_name: dev window 
  focus: true
  layout: tiled
  shell_command_before:
    - export DATE=$(date "+%Y-%m-%d_%H-%M-%S")
  panes:
  - shell_command: # 1. indoor delivery simulation + Nav2 + scenario
    - ros2 launch robotics_nav2 indoor_delivery.launch.py scene:=${ROBOTICS_SCENE:-warehouse} use_gazebo_gui:=${ROBOTICS_GAZEBO_GUI:-false} use_rviz:=${ROBOTICS_RVIZ:-false} force_software_rendering:=${GAZEBO_FORCE_SOFTWARE_RENDERING:-true}
  - shell_command: # 2. teleop_twist_keyboard
    - ros2 run teleop_twist_keyboard teleop_twist_keyboard
